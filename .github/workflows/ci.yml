name: CI

on:
  push:
    branches: [main]
  # No `branches:` filter on PRs so stacked / chained PRs (base != main) still
  # get CI signal. The `push` trigger above stays main-only since we only
  # publish-tag from main.
  pull_request:

# Workflow-level GITHUB_TOKEN scope. No job in this file pushes code,
# comments on PRs, or creates releases; all writes to external services
# use their own non-GITHUB_TOKEN secrets. contents:read is the safe floor.
permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev deps
        run: pip install -e '.[dev,posthog]'
      - name: ruff check
        run: ruff check src tests scripts
      - name: ruff format --check
        run: ruff format --check src tests scripts

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev deps
        run: pip install -e '.[dev,posthog]'
      - name: pytest
        run: pytest -v
